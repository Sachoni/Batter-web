<!DOCTYPE html>

</head>
<body>

<h2><U>Register.Batter</U></h2>

<div class="Register_container">
<input class="input1" type="email" id="email" placeholder="Enter Email" required>
<input class="input2" type="password" id="password" placeholder="Enter Password" required>
<a class="btn" id="registerBtn"> Next</a>
</div>

<p>Already have account? <a href="login.html">Login</a></p>

<script type="module">

import { auth } from "./firebase.js";
import { createUserWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const registerBtn = document.getElementById("registerBtn");

registerBtn.addEventListener("click", () => {
  const email = document.getElementById("name").value;
  const password = document.getElementById("phone").value;

  createUserWithEmailAndPassword(auth, email, password)
    .then((userCredential) => {
      alert("Registration Successful!");
      window.location.href = "login.html";
    })
    .catch((error) => {
      alert(error.message);
    });
});

</script>

</body>
